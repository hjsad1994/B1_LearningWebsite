<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HUTECH English 100 Quiz</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body
    data-quiz-id="english100"
    data-quick-mode="random10"
    data-full-label="Ôn hết 100 câu"
    data-quick-label="Luyện nhanh 10 câu"
    data-ready-full="Sẵn sàng ôn toàn bộ 100 câu"
    data-ready-quick="Sẵn sàng luyện nhanh 10 câu"
  >
    <div class="page-shell">
      <header class="hero">
        <nav class="page-nav">
          <a href="/">Trang chọn đề</a>
          <a href="/reading-mixed.html">Sang đề Reading</a>
          <a href="/signs-40.html">Sang đề Signs 40</a>
        </nav>

        <p class="eyebrow">English 100</p>
        <h1>Bộ đề trắc nghiệm tiếng Anh 100 câu</h1>
        <p class="intro">Giữ nguyên kiểu làm như web cũ, nhưng có trang riêng cho bộ đề 100 câu để bạn ôn tập tập trung hơn.</p>
        <div class="hero-stats">
          <div>
            <span class="stat-label">Chế độ ôn tập</span>
            <strong id="mode-label">Ôn hết 100 câu</strong>
          </div>
          <div>
            <span class="stat-label">Số câu hỏi</span>
            <strong id="question-count">...</strong>
          </div>
          <div>
            <span class="stat-label">Trạng thái</span>
            <strong id="status-text">Đang tải đề...</strong>
          </div>
        </div>

        <form id="mode-form" class="mode-form">
          <label class="mode-option" for="mode-full">
            <input id="mode-full" type="radio" name="study-mode" value="full" checked />
            <span>
              <strong>Ôn hết 100 câu</strong>
              <small>Làm toàn bộ đề theo đúng thứ tự trong file CSV gốc.</small>
            </span>
          </label>
          <label class="mode-option" for="mode-random10">
            <input id="mode-random10" type="radio" name="study-mode" value="random10" />
            <span>
              <strong>Luyện nhanh 10 câu</strong>
              <small>Lấy ngẫu nhiên 10 câu để ôn nhanh, vẫn giữ nguyên thứ tự đáp án A, B, C, D.</small>
            </span>
          </label>
        </form>
      </header>

      <main>
        <section id="result-panel" class="result-panel hidden" aria-live="polite"></section>
        <form id="quiz-form" class="quiz-list"></form>
      </main>
    </div>

    <template id="question-template">
      <section class="question-card">
        <div class="question-top">
          <span class="question-number"></span>
          <span class="question-state">Chưa trả lời</span>
        </div>
        <h2 class="question-text"></h2>
        <div class="options"></div>
        <p class="feedback hidden"></p>
      </section>
    </template>

    <script src="/app.js" defer></script>
  </body>
</html>
